<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#8b5e3c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="每日靈糧">
  <title>每日靈糧</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
  <header>
    <p class="app-label">每日靈糧 · Daily Verse</p>
    <p id="date-display" class="date-label"></p>
  </header>

  <main>
    <div class="card">
      <p id="verse-text" class="verse-text"></p>
      <p id="verse-ref"  class="verse-ref"></p>
      <hr class="divider">
      <button id="email-btn" class="email-btn">發送到我的郵箱</button>
    </div>
  </main>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-testament="today">今日</button>
    <button class="nav-btn" data-testament="old_testament">舊約</button>
    <button class="nav-btn" data-testament="new_testament">新約</button>
    <button class="nav-btn" data-testament="gospels">福音書</button>
    <button class="nav-btn" data-testament="random">隨機</button>
  </nav>

  <div id="email-modal" class="modal hidden">
    <div class="modal-box">
      <h3>發送經文</h3>
      <input type="email" id="email-input" placeholder="請輸入郵箱地址" autocomplete="email">
      <div class="modal-actions">
        <button id="send-btn">發送</button>
        <button id="cancel-btn">取消</button>
      </div>
      <p id="send-status" class="send-status"></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
